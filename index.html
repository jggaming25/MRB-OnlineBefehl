<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ONLINE BEFEHL</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="shell">
  <aside class="sidebar">
    <div class="brand">
      <span class="lamp" id="lamp"></span>
      <div>
        <h1>ONLINE BEFEHL</h1>
        <p>Betriebsstelle · Simulation</p>
      </div>
    </div>

    <nav id="mainNav" class="mainnav hidden"></nav>

    <div id="userBadge" class="user-badge hidden">
      <div class="user-badge-name" id="userBadgeName"></div>
      <span id="userBadgeRole" class="role-pill"></span>
    </div>
  </aside>

  <main id="app" class="app"></main>
</div>

<template id="tpl-login">
  <div class="panel panel-narrow fade-in">
    <p class="disclaimer">ONLINE BEFEHL ist eine fiktive Trainingsumgebung für den Betriebsdienst (Roblox-Simulation). Keine Verwendung im realen Bahnbetrieb.</p>
    <h2>Anmeldung</h2>
    <form id="loginForm" class="form">
      <label>Benutzername
        <input type="text" id="loginUsername" autocomplete="username" required>
      </label>
      <label>Passwort
        <input type="password" id="loginPassword" autocomplete="current-password" required>
      </label>
      <p id="loginError" class="error hidden"></p>
      <button type="submit" class="btn btn-primary">Anmelden</button>
    </form>
  </div>
</template>

<template id="tpl-force-password">
  <div class="panel panel-narrow fade-in">
    <h2>Eigenes Passwort festlegen</h2>
    <p class="hint">Du hast dich mit einem Einmal-Passwort angemeldet. Lege jetzt dein eigenes Passwort fest, um fortzufahren.</p>
    <form id="forcePwForm" class="form">
      <label>Neues Passwort (mind. 6 Zeichen)
        <input type="password" id="newPassword" minlength="6" required>
      </label>
      <label>Neues Passwort wiederholen
        <input type="password" id="newPassword2" minlength="6" required>
      </label>
      <p id="forcePwError" class="error hidden"></p>
      <button type="submit" class="btn btn-primary">Passwort speichern & fortfahren</button>
    </form>
  </div>
</template>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/katalog.js"></script>
<script src="js/app.js"></script>
</body>
</html>
