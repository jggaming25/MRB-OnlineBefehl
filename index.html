<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Online Befehl</title>
<meta name="theme-color" content="#14140f">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Online Befehl">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/favicon-32.png">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="shell">
  <aside class="sidebar">
    <div class="brand">
      <img src="icons/icon-192.png" alt="" class="brand-mark">
      <div>
        <h1>Online Befehl</h1>
        <p>Betriebsstelle · Simulation</p>
      </div>
    </div>

    <nav id="mainNav" class="mainnav hidden"></nav>

    <button id="installBtn" class="btn btn-ghost btn-sm install-btn hidden">App installieren</button>

    <div id="userBadge" class="user-badge hidden">
      <div class="user-badge-name" id="userBadgeName"></div>
      <span id="userBadgeRole" class="role-pill"></span>
    </div>
  </aside>

  <main id="app" class="app"></main>
</div>

<template id="tpl-login">
  <div class="panel panel-narrow fade-in">
    <p class="disclaimer">Online Befehl ist eine fiktive Trainingsumgebung für den Betriebsdienst (Roblox-Simulation). Keine Verwendung im realen Bahnbetrieb.</p>
    <h2>Anmeldung</h2>
    <form id="loginForm" class="form">
      <label>Benutzername
        <input type="text" id="loginUsername" autocomplete="username" required>
      </label>
      <label>Passwort
        <input type="password" id="loginPassword" autocomplete="current-password" required>
      </label>
      <p id="loginError" class="error hidden"></p>
      <button type="submit" class="btn btn-primary">Anmelden</button>
    </form>

    <button id="hrCreateBtn" type="button" class="btn btn-ghost hidden" style="width:100%; margin-top:14px;" onclick="openHrMasterStep()">Create HR Account</button>

    <form id="hrMasterForm" class="form hidden" style="margin-top:14px; padding-top:14px; border-top:1px solid var(--line);">
      <label>Master-E-Mail <input type="email" id="hrMasterEmail" autocomplete="off" required></label>
      <label>Master-Passwort <input type="password" id="hrMasterPassword" autocomplete="off" required></label>
      <p id="hrMasterError" class="error hidden"></p>
      <div style="display:flex; gap:8px;">
        <button type="submit" class="btn btn-primary" style="flex:1;">Weiter</button>
        <button type="button" class="btn btn-ghost" onclick="closeHrFlow()">Abbrechen</button>
      </div>
    </form>

    <form id="hrCreateForm" class="form hidden" style="margin-top:14px; padding-top:14px; border-top:1px solid var(--line);">
      <label>Benutzername (neues HR-Konto) <input type="text" id="hrNewUsername" autocomplete="off" required></label>
      <label>Passwort (mind. 6 Zeichen) <input type="password" id="hrNewPassword" minlength="6" autocomplete="off" required></label>
      <p id="hrCreateError" class="error hidden"></p>
      <div style="display:flex; gap:8px;">
        <button type="submit" class="btn btn-primary" style="flex:1;">HR-Konto erstellen</button>
        <button type="button" class="btn btn-ghost" onclick="closeHrFlow()">Abbrechen</button>
      </div>
    </form>
  </div>
</template>

<template id="tpl-force-password">
  <div class="panel panel-narrow fade-in">
    <h2>Eigenes Passwort festlegen</h2>
    <p class="hint">Du hast dich mit einem Einmal-Passwort angemeldet. Lege jetzt dein eigenes Passwort fest, um fortzufahren.</p>
    <form id="forcePwForm" class="form">
      <label>Neues Passwort (mind. 6 Zeichen)
        <input type="password" id="newPassword" minlength="6" required>
      </label>
      <label>Neues Passwort wiederholen
        <input type="password" id="newPassword2" minlength="6" required>
      </label>
      <p id="forcePwError" class="error hidden"></p>
      <button type="submit" class="btn btn-primary">Passwort speichern & fortfahren</button>
    </form>
  </div>
</template>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/katalog.js"></script>
<script src="js/app.js"></script>
<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => navigator.serviceWorker.register("sw.js").catch(() => {}));
  }
  let deferredInstallPrompt = null;
  window.addEventListener("beforeinstallprompt", (e) => {
    e.preventDefault();
    deferredInstallPrompt = e;
    document.getElementById("installBtn").classList.remove("hidden");
  });
  document.getElementById("installBtn").addEventListener("click", async () => {
    if (!deferredInstallPrompt) return;
    deferredInstallPrompt.prompt();
    await deferredInstallPrompt.userChoice;
    deferredInstallPrompt = null;
    document.getElementById("installBtn").classList.add("hidden");
  });
  window.addEventListener("appinstalled", () => {
    document.getElementById("installBtn").classList.add("hidden");
  });
</script>
</body>
</html>
